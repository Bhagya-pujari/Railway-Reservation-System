<!DOCTYPE html>
<html>
<head>
    <title>Railway Reservation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .login-box {
            width: 350px;
            margin: auto;
            margin-top: 30px;
        }

        .train-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .hero-title {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand text-white">Railway System</span>

    <div>
        <a href="{% url 'login' %}" class="btn btn-success me-2">Login</a>
        <a href="{% url 'register' %}" class="btn btn-primary me-2">Create Account</a>
        <a href="{% url 'mybookings' %}" class="btn btn-warning me-2">My Bookings</a>
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>
</nav>


<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlwr42vVjEVzOvqOJGOZO0_RsZIQbbqwPUFA&s"
     class="train-img">


<div class="hero-title">
    Railway Reservation System
</div>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
